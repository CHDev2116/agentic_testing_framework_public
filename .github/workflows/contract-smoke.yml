name: Contract smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  contract-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inference contract smoke (stdlib mock)
        run: bash examples/mock_api_roundtrip/ci_smoke.sh
